<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | PoolFinder Control</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f8;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .ocean-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #0891b2 100%);
        }

        .float { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

<body class="min-h-screen flex items-start justify-center p-6 relative overflow-y-auto">

    <!-- background -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-400/20 rounded-full blur-[120px] float"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-400/20 rounded-full blur-[120px] float" style="animation-delay: -3s;"></div>

    <!-- back -->
    <div class="absolute top-10 left-10 z-50">
        <a href="{{ url_for('main.admin_login') }}" 
           class="flex items-center gap-3 px-6 py-3 bg-white/50 backdrop-blur-lg border rounded-2xl text-slate-600 hover:text-blue-600">
            ← Kembali ke Login
        </a>
    </div>

    <div class="max-w-md w-full relative z-10">

        <!-- header -->
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black text-slate-900 uppercase italic">
                PoolFinder <span class="text-blue-600">Admin</span>
            </h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">
                Reset Akses Akun
            </p>
        </div>

        <!-- form -->
        <form method="POST" class="space-y-6">

    <!-- email -->
    <div class="space-y-2">
        <label class="block text-[10px] font-black text-slate-400 uppercase ml-2">
            Email Admin
        </label>
        <input type="email" name="username" required
            class="w-full p-5 rounded-3xl border bg-white/80 font-bold"
            placeholder="Masukkan Email Admin">
    </div>

    <button type="submit"
        class="w-full ocean-gradient text-white py-5 rounded-3xl font-black">
        Kirim Link Reset
    </button>

</form>

    </div>

    <!-- SCRIPT -->
    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            const open = document.getElementById("eye-open");
            const close = document.getElementById("eye-close");

            if (input.type === "password") {
                input.type = "text";
                open.classList.add("hidden");
                close.classList.remove("hidden");
            } else {
                input.type = "password";
                open.classList.remove("hidden");
                close.classList.add("hidden");
            }
        }
    </script>

</body>
</html>
