<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | PoolFinder Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f8;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .ocean-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #0891b2 100%);
        }
        /* Floating Animation */
        .float { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="min-h-screen flex items-start justify-center p-6 relative overflow-y-auto">
    
    <!-- Background Decor -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-400/20 rounded-full blur-[120px] float"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-400/20 rounded-full blur-[120px] float" style="animation-delay: -3s;"></div>

    <!-- Back Button -->
    <div class="absolute top-10 left-10 z-50">
        <a href="{{ url_for('main.index') }}" 
           class="group flex items-center gap-3 px-6 py-3 bg-white/50 backdrop-blur-lg border border-white rounded-2xl text-slate-600 hover:text-blue-600 transition-all duration-300 shadow-sm hover:shadow-blue-200/50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform group-hover:-translateX-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            <span class="font-black text-[10px] uppercase tracking-widest">Kembali ke Beranda</span>
        </a>
    </div>

    <div class="max-w-md w-full relative z-10">
        <!-- Logo Section -->
        <div class="text-center mb-10 flex flex-col items-center">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-700 to-cyan-400 rounded-[2rem] flex items-center justify-center shadow-2xl shadow-blue-200 mb-6 group transition-transform hover:rotate-12 duration-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4a2 2 0 012-2m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tighter italic uppercase">PoolFinder <span class="text-blue-600">Admin</span></h1>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mt-2">Access Management Portal</p>
        </div>

        <div class="glass-panel rounded-[3.5rem] p-12 shadow-2xl shadow-blue-900/5 relative overflow-hidden">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="mb-8 p-4 bg-rose-50 border border-rose-100 text-rose-600 text-[11px] font-black uppercase tracking-widest rounded-2xl flex items-center gap-3 animate-pulse">
                            <span class="w-2 h-2 bg-rose-500 rounded-full"></span> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('main.admin_login') }}" method="POST" class="space-y-6">
                <!-- Username -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">ID Kendali</label>
                    <input type="text" name="username" required
                        class="w-full bg-white/80 border border-slate-100 p-5 rounded-3xl focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500 transition-all text-slate-900 font-bold placeholder:text-slate-300 shadow-sm" 
                        placeholder="Admin Username">
                </div>

                <!-- Password with Toggle Visibility -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Kunci Akses</label>
                    <div class="relative">
                        <input type="password" name="password" id="passwordInput" required
                            class="w-full bg-white/80 border border-slate-100 p-5 pr-14 rounded-3xl focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500 transition-all text-slate-900 font-bold placeholder:text-slate-300 shadow-sm" 
                            placeholder="••••••••">
                        <button type="button" id="togglePassword" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition-colors focus:outline-none">
                            <!-- Icon Eye (Show) -->
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <!-- Icon Eye Off (Hide) - Hidden by default -->
                            <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Forgot Password Link -->
                <div class="text-right">
                    <a href="{{ url_for('main.lupa_password') }}"
                       class="text-[10px] font-bold text-blue-500 hover:text-blue-700 uppercase tracking-widest transition-colors">
                        Lupa Password?
                    </a>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit" 
                        class="w-full ocean-gradient text-white font-black py-5 rounded-3xl shadow-xl shadow-blue-600/20 transition-all hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3 uppercase tracking-widest text-xs">
                        Otorisasi Masuk
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="text-center mt-10">
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                Protected System &copy; 2026 <span class="text-blue-500">PoolFinder Malang</span>
            </p>
        </div>
    </div>

    <!-- Script for Password Toggle -->
    <script>
        const passwordInput = document.getElementById('passwordInput');
        const toggleButton = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');

        toggleButton.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            
            // Toggle type attribute
            passwordInput.type = isPassword ? 'text' : 'password';
            
            // Toggle icons visibility
            if (isPassword) {
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
